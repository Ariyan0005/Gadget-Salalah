    <script type="application/ld+json">

      "name": "Gadget Salalah",

      "priceRange": "$$",
      "currenciesAccepted": "OMR",

        "@type": "PostalAddress",
        "streetAddress": "Al Nahdha St",
        "addressLocality": "Salalah",

      "geo": {
        "@type": "GeoCoordinates",

      },
      "openingHoursSpecification": [

          "@type": "OpeningHoursSpecification",

          {"@type": "Offer", "itemOffered": {"@type": "Product", "name": "Tablets"}}
        ]
      },
      "sameAs": [
        "https://www.facebook.com/gadgetsalalah",
        "https://www.instagram.com/gadgetsalalah",
        "https://twitter.com/gadgetsalalah"
      ]
    }
